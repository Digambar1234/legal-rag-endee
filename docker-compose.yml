version: "3.9"

services:

  # ------------------------------------------------------------------ #
  #  Endee Vector Database (forked from endee-io/endee)                #
  # ------------------------------------------------------------------ #
  endee:
    image: endeeio/endee-server:latest
    container_name: endee-server
    ports:
      - "8080:8080"
    environment:
      NDD_NUM_THREADS: 0          # 0 = use all available CPU cores
      NDD_AUTH_TOKEN: ""          # Leave empty for open mode (no auth)
    volumes:
      - endee-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/index/list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------ #
  #  Streamlit Web UI                                                   #
  # ------------------------------------------------------------------ #
  streamlit-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal-rag-ui
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      ENDEE_URL: "http://endee:8080"
    volumes:
      - ./data:/app/data
    depends_on:
      endee:
        condition: service_healthy
    restart: unless-stopped

  # ------------------------------------------------------------------ #
  #  FastAPI REST Backend (optional — for programmatic access)         #
  # ------------------------------------------------------------------ #
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal-rag-api
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      ENDEE_URL: "http://endee:8080"
      ENDEE_INDEX: "legal_docs"
      TOP_K: "5"
    volumes:
      - ./data:/app/data
    depends_on:
      endee:
        condition: service_healthy
    restart: unless-stopped

volumes:
  endee-data:
    name: endee-data
